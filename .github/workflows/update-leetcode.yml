name: Update LeetCode Stats

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update LeetCode Activity
    
    steps:
      - uses: actions/checkout@v3

      - name: Generate LeetCode Activity
        uses: Dhruv-D-Bhrasadiya/leetcode-activity-generator@main
        with:
          username: dhruv_bhrasadiya
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output: "heatmap.svg, activity.svg"

      - name: Commit and push
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Updated LeetCode activity" || exit 0
          git push
